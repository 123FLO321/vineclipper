name: Build
on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Make gradlew executable
        run: chmod +x gradlew
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
      - uses: gradle/actions/setup-gradle@v4
      - name: Build all versions
        run: |
          set -o pipefail
          ./gradlew build 2>&1 | tee build.log
      - name: Surface build failure (diagnostic)
        if: failure()
        run: |
          MSG=$(tail -n 150 build.log | sed 's/%/%25/g' | sed ':a;N;$!ba;s/\n/%0A/g')
          echo "::error::${MSG}"
      - name: Dry-run publish configuration
        run: ./gradlew publishMods --continue
      - uses: actions/upload-artifact@v4
        with:
          name: jars
          path: |
            versions/**/build/libs/*.jar
            !versions/**/build/libs/*-sources*.jar
            !versions/**/build/libs/*-dev*.jar
