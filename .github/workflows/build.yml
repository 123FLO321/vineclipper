name: Build
on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g"
    steps:
      - uses: actions/checkout@v4
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL || true
          df -h /
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
      - uses: gradle/actions/setup-gradle@v4
      - name: Build all versions
        run: |
          set -o pipefail
          ./gradlew build -Dorg.gradle.workers.max=2 --max-workers=2 2>&1 | tee build.log
      - name: Surface build failure (diagnostic)
        if: failure()
        run: |
          {
            echo "## Build failure diagnostics"
            echo '### df -h'
            echo '```'
            df -h || true
            echo '```'
            echo '### free -m'
            echo '```'
            free -m || true
            echo '```'
            echo '### dmesg (tail 50)'
            echo '```'
            sudo dmesg 2>/dev/null | tail -n 50 || echo "dmesg unavailable"
            echo '```'
            echo '### build.log (tail 150)'
            echo '```'
            tail -n 150 build.log || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          MSG=$(tail -n 150 build.log | sed 's/%/%25/g' | sed ':a;N;$!ba;s/\n/%0A/g')
          echo "::error::${MSG}"
      - name: Dry-run publish configuration
        run: ./gradlew publishMods --continue
      - uses: actions/upload-artifact@v4
        with:
          name: jars
          path: |
            versions/**/build/libs/*.jar
            !versions/**/build/libs/*-sources*.jar
            !versions/**/build/libs/*-dev*.jar
