name: Build
on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g"
    steps:
      - uses: actions/checkout@v4
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL || true
          df -h /
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
      - uses: gradle/actions/setup-gradle@v4
      - name: Build all versions
        run: |
          set -o pipefail
          ./gradlew build -Dorg.gradle.workers.max=2 --max-workers=2 2>&1 | tee build.log
      - name: Surface build failure (diagnostic)
        if: failure()
        run: |
          B1=$(grep -n -A 3 -E "FAILURE:|What went wrong|Caused by:|OutOfMemoryError|No space left" build.log | tail -c 3000 | sed 's/%/%25/g' | sed ':a;N;$!ba;s/\n/%0A/g')
          echo "::error::GRADLE-FAILURE-BLOCK: ${B1}"

          B2=$(tail -c 3000 build.log | sed 's/%/%25/g' | sed ':a;N;$!ba;s/\n/%0A/g')
          echo "::error::LOG-TAIL: ${B2}"

          B3=$( { echo "df:"; df -h / | tail -1; echo "free:"; free -m | head -2; echo "dmesg:"; sudo dmesg 2>/dev/null | grep -iE "oom|killed process" | tail -5 || true; } | sed 's/%/%25/g' | sed ':a;N;$!ba;s/\n/%0A/g')
          echo "::error::SYSTEM-STATE: ${B3}"

          {
            echo "## Build failure diagnostics"
            echo '### Gradle failure grep (FAILURE:/What went wrong/Caused by/OOM/No space left)'
            echo '```'
            grep -n -A 3 -E "FAILURE:|What went wrong|Caused by:|OutOfMemoryError|No space left" build.log || true
            echo '```'
            echo '### build.log tail (3000 chars)'
            echo '```'
            tail -c 3000 build.log || true
            echo '```'
            echo '### system state'
            echo '```'
            df -h || true
            free -m || true
            sudo dmesg 2>/dev/null | grep -iE "oom|killed process" | tail -20 || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Dry-run publish configuration
        run: ./gradlew publishMods --continue
      - uses: actions/upload-artifact@v4
        with:
          name: jars
          path: |
            versions/**/build/libs/*.jar
            !versions/**/build/libs/*-sources*.jar
            !versions/**/build/libs/*-dev*.jar
